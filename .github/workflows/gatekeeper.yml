name: Security Gatekeeper Pipeline

on:
  push:
    branches: [ "main", "vulnerable" ]
  workflow_dispatch:

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Ensure Dockerfile exists
      - name: List repo files
        run: ls -l

      # 3. Login to ACR
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/vulnerable-app:latest .

      # 5. Run Trivy Scan
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/vulnerable-app:latest
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      # 6. Push image if scan passes
      - name: Push Image to ACR
        if: success()
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/vulnerable-app:latest."
