name: Security Gatekeeper Pipeline

# Trigger the workflow on pushes to main or vulnerable branch
on:
  push:
    branches: [ "main", "vulnerable" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Debug: list files (optional but helps verify Dockerfile exists)
      - name: List repo files
        run: ls -l

      # 3️⃣ Login to Azure Container Registry (optional if pushing image)
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4️⃣ Build Docker image
      - name: Build Docker Image
        run: docker build -t vulnerable-app:local .

      # 5️⃣ Run Trivy security scan (CRITICAL only)
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: vulnerable-app:local
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      # 6️⃣ Push image to ACR (only if Trivy scan passes)
      - name: Push Image to ACR
        if: success()
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/vulnerable-app:local
