name: Security Gatekeeper Pipeline

on:
  push:
    branches: ["main", "vulnerable"]
  workflow_dispatch:

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Build the Docker image locally
      - name: Build Docker Image
        run: |
          docker build -t vulnerable-app:local .

      # 3️⃣ Run Trivy scan using the official Trivy Docker image
      - name: Run Trivy Security Scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.56.1 image \
            --format table \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            vulnerable-app:local

      # 4️⃣ Push to ACR only if scan passes
      - name: Login to Azure Container Registry
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push Docker Image to ACR
        if: success()
        run: |
          docker tag vulnerable-app:local ${{ secrets.ACR_LOGIN_SERVER }}/vulnerable-app:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/vulnerable-app:${{ github.sha }}
          echo "Image pushed successfully!"
