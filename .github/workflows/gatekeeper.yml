name: Security Gatekeeper Pipeline

on:
  push:
    branches: ["main", "vulnerable"]
  workflow_dispatch:

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Build your Docker image
      - name: Build Docker Image
        run: docker build -t vulnerable-app:local .

      # 3️⃣ Run Trivy inside its official Docker container
      - name: Run Trivy Scan (Docker)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.56.1 image \
          --format table \
          --exit-code 1 \
          --severity CRITICAL \
          --ignore-unfixed \
          vulnerable-app:local
